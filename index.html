<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>授業タイマー・みらかけ日程</title>
    
    <!-- 📱 PWA（アプリ化）用設定 -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="授業タイマー">

    <style>
        :root {
            --bg-dark: #030712;
            --panel-bg: rgba(15, 23, 42, 0.45);
            --panel-border: rgba(6, 182, 212, 0.25);
            --cyan: #06b6d4;
            --cyan-glow: rgba(6, 182, 212, 0.4);
            --green: #10b981;
            --green-glow: rgba(16, 185, 129, 0.4);
            --yellow: #f59e0b;
            --yellow-glow: rgba(245, 158, 11, 0.3);
            --red: #ef4444;
            --red-glow: rgba(239, 68, 68, 0.4);
            --purple: #a855f7;
            --purple-glow: rgba(168, 85, 247, 0.4);
            --text-muted: rgba(156, 163, 175, 0.8);
            --text-main: #f3f4f6;
        }

        /* ーーー アクセシビリティ・テーマ設定 ーーー */
        body.theme-dark {
            --bg-dark: #0a0a0a;
            --panel-bg: #121212;
            --panel-border: #262626;
            --cyan: #38bdf8;
            --purple: #c084fc;
        }
        body.theme-light {
            --bg-dark: #f3f4f6;
            --panel-bg: #ffffff;
            --panel-border: #d1d5db;
            --cyan: #0284c7;
            --green: #16a34a;
            --yellow: #d97706;
            --red: #dc2626;
            --purple: #9333ea;
            --text-muted: #4b5563;
            --text-main: #1f2937;
            background: #f3f4f6;
            color: var(--text-main);
        }
        body.theme-highcontrast {
            --bg-dark: #000000;
            --panel-bg: #000000;
            --panel-border: #ffffff;
            --cyan: #00ffff;
            --green: #00ff00;
            --yellow: #ffff00;
            --red: #ff0000;
            --purple: #ff00ff;
            --text-muted: #ffffff;
            --text-main: #ffffff;
            background: #000000;
        }

        * {
            box-sizing: border-box;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
            color: var(--text-main);
            background: radial-gradient(circle at 50% 10%, #0f172a 0%, var(--bg-dark) 70%);
            background-attachment: fixed;
            line-height: 1.5;
            overflow-x: hidden;
            padding: 20px 15px;
        }

        /* 📱 通常・タブレット共通ラッパー（最大横幅を少し広げてタブレットで映えるように） */
        .wrapper {
            max-width: 650px;
            margin: auto;
        }

        .card {
            background: var(--panel-bg);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-radius: 28px;
            padding: 30px 24px;
            border: 1px solid var(--panel-border);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }

        /* コントロール群 */
        .accessibility-bar {
            display: flex;
            justify-content: center;
            gap: 6px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .theme-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--panel-border);
            color: var(--text-main);
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 12px;
            cursor: pointer;
            font-weight: 600;
        }
        .theme-btn:hover { background: rgba(255, 255, 255, 0.15); }

        h1 {
            text-align: center;
            font-size: clamp(20px, 5vw, 28px);
            margin: 0 0 4px 0;
            font-weight: 800;
            letter-spacing: 0.5px;
            background: linear-gradient(to right, #ffffff, var(--cyan), var(--purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        body.theme-light h1 {
            background: none;
            -webkit-text-fill-color: initial;
            color: var(--text-main);
        }

        .date {
            text-align: center;
            color: var(--text-muted);
            font-size: 13px;
            margin-bottom: 24px;
            letter-spacing: 0.5px;
        }

        /* ーーー タイマー表示スタイル ーーー */
        .timer-container {
            display: flex;
            justify-content: center;
            margin: 20px 0;
            min-height: 220px;
            align-items: center;
        }

        /* 🟢 1. 円形表示スタイル */
        .circle-style {
            position: relative;
            width: clamp(200px, 40vw, 260px);
            height: clamp(200px, 40vw, 260px);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .circle-style svg {
            transform: rotate(-90deg);
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            filter: drop-shadow(0 0 10px var(--cyan-glow));
        }
        .bg-circle { fill: none; stroke: rgba(255, 255, 255, 0.05); stroke-width: 10; }
        body.theme-highcontrast .bg-circle { stroke: #333; }
        .progress-circle { fill: none; stroke: url(#color-class); stroke-width: 10; stroke-linecap: round; transition: stroke-dashoffset 0.3s linear; }
        .center { position: relative; z-index: 10; text-align: center; width: 90%; padding: 8px; }
        .clock { font-size: clamp(24px, 5vw, 32px); font-weight: 800; color: var(--text-main); line-height: 1.1; }
        .remain { font-size: clamp(11px, 2.3vw, 14px); color: #fde68a; margin-top: 6px; font-weight: 600; }
        body.theme-light .remain { color: var(--yellow); }

        /* 🟦 2. デジタル大画面スタイル（タブレットで映える横長の巨大文字） */
        .digital-style {
            width: 100%;
            padding: 30px 20px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            text-align: center;
            box-shadow: inset 0 4px 20px rgba(0,0,0,0.4);
        }
        .digital-style .clock {
            font-size: clamp(48px, 10vw, 72px); /* 超巨大デジタル数字 */
            font-family: monospace, system-ui;
            letter-spacing: 2px;
            color: var(--cyan);
            text-shadow: 0 0 20px var(--cyan-glow);
        }
        .digital-style .remain {
            font-size: clamp(16px, 3vw, 22px);
            margin-top: 10px;
        }

        .status { text-align: center; font-size: clamp(14px, 3vw, 18px); font-weight: 700; margin-bottom: 20px; padding: 0 8px; }

        /* 操作パネル（全画面・タイマー表示切り替え・タイマーだけ表示） */
        .controls-grid {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }
        .control-btn {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--panel-border);
            color: var(--text-main);
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .control-btn:hover {
            background: rgba(6, 182, 212, 0.15);
            border-color: var(--cyan);
        }

        /* ーーー 📺 タイマーだけ表示（フォーカスモード） ーーー */
        body.focus-mode .accessibility-bar,
        body.focus-mode h1,
        body.focus-mode .date,
        body.focus-mode .status,
        body.focus-mode .section,
        body.focus-mode .control-btn.hide-in-focus {
            display: none !important;
        }
        body.focus-mode {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            padding: 0;
            overflow: hidden;
        }
        body.focus-mode .wrapper {
            max-width: 90%;
            width: 100%;
        }
        body.focus-mode .card {
            border: none;
            background: transparent;
            box-shadow: none;
            padding: 10px;
        }
        body.focus-mode .timer-container {
            min-height: auto;
            margin: 0;
        }
        body.focus-mode .circle-style {
            width: clamp(280px, 60vw, 450px);
            height: clamp(280px, 60vw, 450px);
        }
        body.focus-mode .circle-style .clock {
            font-size: clamp(32px, 7vw, 56px);
        }
        body.focus-mode .circle-style .remain {
            font-size: clamp(14px, 3vw, 22px);
        }
        body.focus-mode .controls-grid {
            margin-top: 30px;
            margin-bottom: 0;
        }

        /* セクション共通 */
        .section { margin-top: 24px; }
        .section.hidden-section { display: none !important; }
        .title { font-size: 14px; font-weight: 700; color: var(--purple); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
        .title::after { content: ''; flex: 1; height: 1px; background: linear-gradient(to right, rgba(168, 85, 247, 0.25), transparent); }

        .box { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; }

        /* カード型表示 */
        .keyword {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(168, 85, 247, 0.2);
            border-radius: 12px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        body.theme-light .keyword { background: #f9fafb; border-color: #e5e7eb; }
        .badge { font-size: 9px; font-weight: 700; padding: 2px 6px; border-radius: 10px; width: fit-content; color: var(--purple); background: rgba(168, 85, 247, 0.1); }
        .keyword-body { font-size: 14px; font-weight: 700; color: var(--text-main); }
        .keyword-room { font-size: 11px; color: var(--text-muted); }

        /* アコーディオン */
        .accordion-btn { width: 100%; background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 10px; padding: 12px 16px; color: var(--text-main); font-weight: 700; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-size: 13px; }
        body.theme-light .accordion-btn { background: #f3f4f6; border-color: #e5e7eb; }
        .accordion-container { max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out; }
        .accordion-container.open { max-height: 400px; overflow-y: auto; }

        .mirakake-day-block { border-left: 3px solid var(--purple); padding-left: 10px; margin-bottom: 12px; padding-top: 4px; padding-bottom: 4px; }
        .mirakake-day-date { font-size: 12px; font-weight: 800; color: var(--purple); margin-bottom: 6px; }
        .mirakake-grid-compact { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 6px; }
        .mirakake-item-compact { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.04); padding: 8px; border-radius: 6px; font-size: 12px; }
        body.theme-light .mirakake-item-compact { background: #f9fafb; border-color: #e5e7eb; }
        .mirakake-item-name { font-weight: 700; color: var(--text-main); }
        .mirakake-item-room { font-size: 11px; color: var(--text-muted); margin-top: 3px; }

        .flash { animation: flash .8s infinite alternate; }
        @keyframes flash { 100% { opacity: 0.3; color: var(--red); } }

        @media (max-width: 500px) { 
            .box { grid-template-columns: 1fr; } 
            .mirakake-grid-compact { grid-template-columns: 1fr; } 
        }
    </style>
</head>
<body>

<div class="wrapper">
    <!-- アクセシビリティバー -->
    <div class="accessibility-bar">
        <button class="theme-btn" onclick="changeTheme('cyber')">🌐 サイバー</button>
        <button class="theme-btn" onclick="changeTheme('dark')">🌑 ダーク</button>
        <button class="theme-btn" onclick="changeTheme('light')">☀️ ライト</button>
        <button class="theme-btn" onclick="changeTheme('highcontrast')">👁️ 高コントラスト</button>
    </div>

    <div class="card">
        <h1>⏱️ 授業タイマー・みらかけ日程</h1>
        <div class="date" id="date"></div>

        <!-- 🔄 タイマー表示エリア (JSでスタイル切替) -->
        <div class="timer-container">
            <div id="timer-box" class="circle-style">
                <svg id="timer-svg" viewBox="0 0 280 280">
                    <defs>
                        <linearGradient id="color-class"><stop offset="0%" stop-color="#06b6d4"/><stop offset="50%" stop-color="#10b981"/><stop offset="100%" stop-color="#ef4444"/></linearGradient>
                        <linearGradient id="color-break"><stop offset="0%" stop-color="#3b82f6"/><stop offset="100%" stop-color="#06b6d4"/></linearGradient>
                        <linearGradient id="color-finished"><stop offset="0%" stop-color="#a855f7"/><stop offset="100%" stop-color="#10b981"/></linearGradient>
                        <linearGradient id="color-sleep"><stop offset="0%" stop-color="#ef4444"/><stop offset="100%" stop-color="#a855f7"/></linearGradient>
                    </defs>
                    <circle class="bg-circle" cx="140" cy="140" r="110"/>
                    <circle id="progress" class="progress-circle" cx="140" cy="140" r="110"/>
                </svg>
                <div class="center">
                    <div class="clock" id="clock">00:00:00</div>
                    <div class="remain" id="remain">ONLINE</div>
                </div>
            </div>
        </div>
        <div class="status" id="status">SYSTEM READY</div>

        <!-- 🛠️ タブレット向け高度な操作パネル -->
        <div class="controls-grid">
            <button class="control-btn hide-in-focus" onclick="toggleTimerStyle()">🔄 タイマー表示を切り替え</button>
            <button class="control-btn" id="focus-toggle-btn" onclick="toggleFocusMode()">📺 タイマーだけ表示</button>
            <button class="control-btn" id="fullscreen-btn" onclick="toggleFullScreen()">🖥️ 全画面表示</button>
        </div>

        <!-- 今日のみらいの架け橋レッスン -->
        <div class="section" id="mirakake-today-section">
            <div class="title">🎨 今日のみらいの架け橋レッスン (12:50〜14:20)</div>
            <div id="mirakake-today" class="box"></div>
        </div>

        <!-- みらかけの日程（アコーディオン） -->
        <div class="section" id="mirakake-list-section">
            <div class="title">📅 みらかけの日程 (7月予定表)</div>
            <button class="accordion-btn" id="accordion-btn" onclick="toggleMirakakeList()">
                <span>📋 全ての日程と教室をみる</span>
                <span id="accordion-icon">▼</span>
            </button>
            <div class="accordion-container" id="mirakake-list-container">
                <div id="mirakake-list" style="padding: 10px 5px;"></div>
            </div>
        </div>
    </div>
</div>

<script>
    const schedule = [
        { name: "1限", start: "09:20", end: "10:10" },
        { name: "2限", start: "10:20", end: "11:10" },
        { name: "3限", start: "11:20", end: "12:10" }
    ];

    const mirakakeSchedule = {
        "2026-07-01": [{ name: "心理学", room: "9B" }, { name: "ミュージック", room: "9C" }, { name: "ビジネスコミュニケーション", room: "6F" }],
        "2026-07-02": [{ name: "オープンレッスン", room: "9A" }, { name: "書道", room: "9B" }, { name: "ダンス", room: "9C" }, { name: "検定", room: "6F" }],
        "2026-07-03": [{ name: "オープンキャンパスプロジェクト", room: "全体" }],
        "2026-07-06": [{ name: "クラフト", room: "9A" }, { name: "ネイル", room: "9B" }, { name: "けん玉", room: "9C" }, { name: "オープンレッスン", room: "6F" }],
        "2026-07-07": [{ name: "謎解き", room: "9A" }, { name: "ネイル", room: "9B" }, { name: "スポーツ", room: "9C" }],
        "2026-07-08": [{ name: "進路 (3年生のみ)", room: "9A" }, { name: "心理学", room: "9B" }, { name: "ミュージック", room: "9C" }, { name: "ビジネスコミュニケーション", room: "6F" }],
        "2026-07-09": [{ name: "e-sports", room: "9B" }, { name: "書道", room: "9C" }, { name: "グローバル", room: "6F" }],
        "2026-07-10": [{ name: "クラフト", room: "9B" }, { name: "生徒会", room: "9C" }, { name: "オープンレッスン", room: "6F" }],
        "2026-07-13": [{ name: "クラフト", room: "9A" }, { name: "ネイル", room: "9B" }, { name: "けん玉", room: "9C" }, { name: "進路の架け橋", room: "6F" }],
        "2026-07-14": [{ name: "イラスト", room: "9A" }, { name: "ネイル", room: "9B" }, { name: "スポーツ", room: "9C" }, { name: "進路の架け橋", room: "6F" }],
        "2026-07-15": [{ name: "オープンレッスン", room: "9A" }, { name: "4コマ漫画", room: "9B" }, { name: "ミュージック", room: "9C" }, { name: "ビジネスコミュニケーション", room: "6F" }],
        "2026-07-16": [{ name: "オープンレッスン", room: "9A" }, { name: "書道", room: "9B" }, { name: "ダンス", room: "9C" }, { name: "検定", room: "6F" }],
        "2026-07-17": [{ name: "みらかけ発表会", room: "全体" }]
    };

    let isDigitalStyle = false;

    function changeTheme(theme) {
        document.body.className = '';
        if(theme !== 'cyber') document.body.classList.add('theme-' + theme);
    }

    // 🔄 タイマー表示の切り替え（円形 ↔ デジタル大画面）
    function toggleTimerStyle() {
        const timerBox = document.getElementById("timer-box");
        const timerSvg = document.getElementById("timer-svg");
        isDigitalStyle = !isDigitalStyle;

        if (isDigitalStyle) {
            timerBox.className = "digital-style";
            timerSvg.style.display = "none";
        } else {
            timerBox.className = "circle-style";
            timerSvg.style.display = "block";
        }
    }

    // 📺 フォーカスモード（タイマーだけ表示）
    function toggleFocusMode() {
        const isFocus = document.body.classList.toggle("focus-mode");
        const btn = document.getElementById("focus-toggle-btn");
        btn.textContent = isFocus ? "🔙 元に戻す" : "📺 タイマーだけ表示";
    }

    // 🖥️ ブラウザの全画面表示モード切替
    function toggleFullScreen() {
        const btn = document.getElementById("fullscreen-btn");
        if (!document.fullscreenElement) {
            document.documentElement.requestFullscreen().then(() => {
                btn.innerHTML = "🚪 全画面を終了";
            }).catch(err => {
                alert(`全画面表示に対応していません: ${err.message}`);
            });
        } else {
            document.exitFullscreen();
            btn.innerHTML = "🖥️ 全画面表示";
        }
    }

    // 全画面表示の解除を検知してボタンテキストを戻す
    document.addEventListener("fullscreenchange", () => {
        const btn = document.getElementById("fullscreen-btn");
        if (!document.fullscreenElement) {
            btn.innerHTML = "🖥️ 全画面表示";
        }
    });

    function toggleMirakakeList() {
        const container = document.getElementById("mirakake-list-container");
        const isOpen = container.classList.toggle("open");
        document.getElementById("accordion-icon").textContent = isOpen ? "▲" : "▼";
        if (isOpen) {
            setTimeout(() => {
                const todayBlock = document.getElementById("mirakake-target-today");
                if (todayBlock) todayBlock.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }, 150);
        }
    }

    const radius = 110;
    const circleLength = 2 * Math.PI * radius;
    const progress = document.getElementById("progress");
    const dateEl = document.getElementById("date");
    const clockEl = document.getElementById("clock");
    const statusEl = document.getElementById("status");
    const remainEl = document.getElementById("remain");

    progress.style.strokeDasharray = circleLength;
    progress.style.strokeDashoffset = circleLength;

    function sec(t) {
        let [h, m] = t.split(":").map(Number);
        return h * 3600 + m * 60;
    }

    function formatDateLocal(dateObj) {
        const y = dateObj.getFullYear();
        const m = String(dateObj.getMonth() + 1).padStart(2, "0
